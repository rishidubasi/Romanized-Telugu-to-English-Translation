<!DOCTYPE html>
<html>
<head>
<title>Telugu Tweet Translator</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: #f2f4f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0px 5px 20px rgba(0,0,0,0.1);
    width:500px;
    text-align:center;
}

h2{
    margin-bottom:20px;
}

input{
    width:90%;
    padding:12px;
    font-size:16px;
    border-radius:5px;
    border:1px solid #ccc;
    margin-bottom:15px;
}

button{
    padding:10px 25px;
    font-size:16px;
    border:none;
    border-radius:5px;
    background:#007bff;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#f7f7f7;
    border-radius:5px;
    min-height:40px;
    font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h2>Romanized Telugu → English Translator</h2>

<input type="text" id="tweet" placeholder="Enter romanized Telugu tweet">

<br>

<button onclick="translateTweet()">Translate</button>

<div class="result" id="result">Translation will appear here</div>

</div>

<script>

async function translateTweet(){

    let tweet = document.getElementById("tweet").value;

    let response = await fetch("http://127.0.0.1:5000/translate",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({tweet:tweet})
    });

    let data = await response.json();

    document.getElementById("result").innerText = data.translation;
}

</script>

</body>
</html>
